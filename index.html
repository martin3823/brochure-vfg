<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFG Brochure</title>
  
  <style>
  * { box-sizing: border-box; }
  
  body, html {
    margin: 0; padding: 0;
    width: 100%;
    /* Sử dụng min-height: 100% để linh hoạt hơn trên mobile */
    min-height: 100%;
    background: #f8f8f8;
  }

  .main-wrapper {
    /* Quan trọng: Dùng flex nhưng cho phép cuộn tự nhiên */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 15px; /* Thêm padding dưới để không bị sát mép */
    width: 100%;
  }

  .content-box {
    width: 100%;
    max-width: 1920px;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Loại bỏ margin: auto để ảnh bắt đầu từ trên xuống một cách tự nhiên */
  }

  .hint-text {
    display: none;
    margin-bottom: 15px;
    font-family: sans-serif;
    font-size: 14px;
    color: #888;
    text-align: center;
  }

  @media (max-width: 1023px) and (orientation: portrait) {
    .hint-text.show-hint {
      display: block;
    }
  }

  img {
    width: 100%;
    height: auto;
    display: block;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    border-radius: 4px;
  }

  /* Fix cho ảnh dọc trên Desktop */
  @media (min-width: 1024px) {
    .main-wrapper { 
      padding: 50px 40px; 
      min-height: 100vh;
      justify-content: center; /* Chỉ căn giữa trên máy tính */
    }
    img.is-portrait {
      max-width: 1000px; /* Thu nhỏ thêm một chút để sắc nét hơn */
    }
  }

  @media (orientation: landscape) {
    .hint-text { display: none !important; }
  }
</style>
</head>
<body>

  <div class="main-wrapper">
    <div class="content-box">
      <div id="hint" class="hint-text">🔄 Vui lòng xoay ngang máy để xem rõ hơn</div>
      
      <img id="brochureImage" src="" alt="VFG Brochure">
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // 1. Khai báo danh sách ảnh kèm theo kiểu dáng
      const imageList = [
        { src: "brochure.jpg", type: "landscape" },        // Ảnh ngang
        { src: "brochure-portrait.jpg", type: "portrait" } // Ảnh dọc
      ];

      // 2. Random
      const randomItem = imageList[Math.floor(Math.random() * imageList.length)];
      
      const imgElement = document.getElementById("brochureImage");
      const hintElement = document.getElementById("hint");

      // 3. Gán ảnh
      imgElement.src = randomItem.src;

      // 4. Kiểm tra logic để hiển thị UI tương ứng
      if (randomItem.type === "portrait") {
        // Nếu là ảnh dọc: Thêm class để thu nhỏ trên desktop và KHÔNG hiện thông báo xoay
        imgElement.classList.add("is-portrait");
        hintElement.classList.remove("show-hint");
      } else {
        // Nếu là ảnh ngang: Cho phép hiện thông báo xoay trên mobile dọc
        imgElement.classList.remove("is-portrait");
        hintElement.classList.add("show-hint");
      }
    });
  </script>

</body>
</html>
