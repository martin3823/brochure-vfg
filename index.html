<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFG Brochure</title>
  
 <style>
  * {
    box-sizing: border-box;
  }
  
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    background: #f8f8f8;
  }

  .main-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 10px; /* Giảm padding một chút để ảnh to hơn trên mobile */
  }

  .content-box {
    margin: auto;
    width: 100%;
    max-width: 1920px;
  }

  /* 1. MẶC ĐỊNH LÀ ẨN DÒNG CHỮ NÀY */
  .hint-text {
    display: none; 
    margin-bottom: 15px;
    font-family: sans-serif;
    font-size: 14px;
    color: #888;
    text-align: center;
  }

  /* 2. CHỈ HIỆN KHI LÀ MÀN HÌNH NHỎ (MOBILE) VÀ ĐANG CẦM DỌC */
  @media (max-width: 1023px) and (orientation: portrait) {
    .hint-text {
      display: block;
    }
  }

  img {
    width: 100%;
    height: auto;
    display: block;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    border-radius: 4px;
  }

  /* Cấu hình cho máy tính hoặc khi đã xoay ngang */
  @media (min-width: 1024px) or (orientation: landscape) {
    .main-wrapper {
      padding: 30px; 
    }
    /* Đảm bảo dòng chữ luôn ẩn ở đây */
    .hint-text {
      display: none !important;
    }
  }
</style>
</head>
<body>

  <div class="main-wrapper">
    <div class="content-box">
      <div class="hint-text">🔄 Vui lòng xoay ngang máy để xem rõ hơn</div>
      
      <img src="brochure.jpg" alt="VFG Brochure">
    </div>
  </div>

</body>
</html>
