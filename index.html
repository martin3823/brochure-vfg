<!DOCTYPE html>
<html lang="vi">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4XTLZ17D21"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-4XTLZ17D21');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFG Brochure</title>

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #f8f8f8;

  /* tránh bị CTA che */
  padding-bottom: 140px;
}

.main-wrapper {
  width: 100%;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 15px;
}

.content-box {
  width: 100%;
  max-width: 1920px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hint-text {
  display: none;
  margin-bottom: 20px;
  font-family: sans-serif;
  font-size: 14px;
  color: #888;
  text-align: center;
}

@media (max-width: 1023px) and (orientation: portrait) {
  .hint-text.show-hint {
    display: block;
  }
}

img {
  width: 100%;
  height: auto;
  display: block;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  border-radius: 4px;
}

/* ================= CTA FLOATING ================= */

.cta-section {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  padding: 12px;
  z-index: 999;

  transition: 0.3s;
}

/* MAIN CTA */
.cta-main {
  display: block;
  background: linear-gradient(135deg, #0068ff, #0052cc);
  color: #fff;
  padding: 14px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  margin-bottom: 10px;
  text-align: center;
  transition: 0.2s;
}

.cta-main:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,104,255,0.4);
}

/* FORM */
.cta-section > a:not(.cta-main) {
  display: block;
  background: #f2f4f7;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
}

/* SECONDARY */
.cta-secondary {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}

.cta-secondary a {
  color: #666;
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {
  .cta-section {
    bottom: 0;
    left: 0;
    transform: none;
    width: 100%;
    max-width: none;
    border-radius: 16px 16px 0 0;
  }
}

@media (min-width: 1024px) {
  img.is-portrait {
    max-width: 1000px;
  }
}

</style>
</head>

<body>

<div class="main-wrapper">
  <div class="content-box">

    <div id="hint" class="hint-text">🔄 Vui lòng xoay ngang máy để xem rõ hơn</div>

    <img id="brochureImage" src="" alt="VFG Brochure">

  </div>
</div>

<!-- CTA FLOATING -->
<div class="cta-section" id="ctaBox">

  <a href="https://zalo.me/0931950605" class="cta-main"
     onclick="gtag('event','click_zalo',{event_category:'engagement'});">
    👉 Nhận tư vấn nhanh qua Zalo
  </a>

  <a href="https://docs.google.com/forms/d/e/1FAIpQLSfDzJJCNEodqHBMdhroKRQHH6LZwNtemmyuIkXCyhe2JxTEnQ/viewform?usp=sharing&ouid=117381462687040849913"
     onclick="gtag('event','click_form',{event_category:'engagement'});">
    📩 Để lại thông tin nhận báo giá
  </a>

  <div class="cta-secondary">
    <a href="https://facebook.com/yourpage"
       onclick="gtag('event','click_facebook',{event_category:'engagement'});">
      Fanpage
    </a>

    <a href="mailto:studio@sdc.vn"
       onclick="gtag('event','click_email',{event_category:'engagement'});">
      Email
    </a>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const imageList = [
    { src: "brochure.jpg", type: "landscape" },
    { src: "brochure-portrait.jpg", type: "portrait" }
  ];

  const randomItem = imageList[Math.floor(Math.random() * imageList.length)];
  
  const imgElement = document.getElementById("brochureImage");
  const hintElement = document.getElementById("hint");

  imgElement.src = randomItem.src;

  if (randomItem.type === "portrait") {
    imgElement.classList.add("is-portrait");
    hintElement.classList.remove("show-hint");
  } else {
    imgElement.classList.remove("is-portrait");
    hintElement.classList.add("show-hint");
  }

  // Scroll tracking
  window.addEventListener("scroll", function() {
    const scrollY = window.scrollY;
    const height = document.body.scrollHeight - window.innerHeight;
    const percent = Math.round((scrollY / height) * 100);

    if (percent > 50 && !window.tracked50) {
      gtag('event', 'scroll_50', {event_category:'engagement'});
      window.tracked50 = true;
    }
  });

  // OPTIONAL: Ẩn CTA khi chưa scroll
  const cta = document.getElementById("ctaBox");
  cta.style.opacity = "0";
  cta.style.pointerEvents = "none";

  window.addEventListener("scroll", function() {
    if (window.scrollY > 200) {
      cta.style.opacity = "1";
      cta.style.pointerEvents = "auto";
    } else {
      cta.style.opacity = "0";
      cta.style.pointerEvents = "none";
    }
  });

});
</script>

</body>
</html>
