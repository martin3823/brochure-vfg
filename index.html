<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VFG Brochure</title>
  
  <style>
    /* Reset lề mặc định của trình duyệt */
    * {
      box-sizing: border-box;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background: #f8f8f8;
    }

    /* Khung ngoài cùng bọc toàn bộ trang */
    .main-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px; /* Giảm padding một chút để ảnh to hơn trên mobile */
    }

    /* Khung chứa nội dung */
    .content-box {
      margin: auto;
      width: 100%;
      max-width: 1920px;
    }

    /* Mặc định là ẨN dòng chữ nhắc nhở */
    .hint-text {
      display: none;
      margin-bottom: 15px;
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
      text-align: center;
    }

    /* Chỉ hiện khi là màn hình nhỏ (Mobile) VÀ đang cầm dọc */
    @media (max-width: 1023px) and (orientation: portrait) {
      .hint-text {
        display: block;
      }
    }

    /* Thiết lập cho ảnh brochure */
    img {
      width: 100%;
      height: auto;
      display: block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      border-radius: 4px;
    }

    /* Cấu hình riêng cho máy tính và khi xoay ngang điện thoại */
    @media (min-width: 1024px) or (orientation: landscape) {
      .main-wrapper {
        padding: 30px; 
      }
      /* Đảm bảo dòng chữ luôn ẩn ở đây */
      .hint-text {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="content-box">
      <div class="hint-text">🔄 Vui lòng xoay ngang máy để xem rõ hơn</div>
      
      <img id="brochureImage" src="" alt="VFG Brochure">
    </div>
  </div>

  <script>
    // Logic Random Ảnh
    document.addEventListener("DOMContentLoaded", function() {
      // 1. Khai báo danh sách các file ảnh
      const imageList = [
        "brochure.jpg",           // Phiên bản ngang
        "brochure-portrait.jpg"  // Phiên bản dọc (NHỚ TẠO FILE NÀY)
      ];

      // 2. Chọn ngẫu nhiên một chỉ số (0 hoặc 1)
      const randomIndex = Math.floor(Math.random() * imageList.length);

      // 3. Gán file ảnh ngẫu nhiên vào thẻ <img>
      const brochureImg = document.getElementById("brochureImage");
      brochureImg.src = imageList[randomIndex];
    });
  </script>

</body>
</html>
