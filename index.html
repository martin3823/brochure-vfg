<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFG Brochure</title>
  <style>
    /* Reset cơ bản để không bị thừa lề */
    * {
      box-sizing: border-box;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f8f8f8; /* Đổi sang xám nhạt để nổi bật brochure trắng */
    }

    /* Container chính chiếm toàn bộ màn hình */
    .main-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column; /* Xếp thông báo trên, ảnh dưới */
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .hint-text {
      margin-bottom: 20px; /* Tạo khoảng cách với ảnh */
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
      text-align: center;
    }

    .img-container {
      width: 100%;
      max-width: 1000px; /* Giới hạn để không quá to trên desktop */
      display: flex;
      justify-content: center;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Đổ bóng sang trọng */
      border-radius: 4px;
    }

    /* Ẩn chữ nhắc nhở khi máy nằm ngang hoặc màn hình lớn */
    @media (min-width: 1024px) or (orientation: landscape) {
      .hint-text {
        display: none;
      }
      .main-wrapper {
        padding: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="hint-text">🔄 Vui lòng xoay ngang máy để xem rõ hơn</div>
    
    <div class="img-container">
      <img src="brochure.jpg" alt="VFG Brochure">
    </div>
  </div>

</body>
</html>
