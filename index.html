<!DOCTYPE html>
<html lang="vi">
<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-4XTLZ17D21"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-4XTLZ17D21');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFG Brochure</title>

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0; padding: 0;
  width: 100%; 
  /* Đã xoá height: 100% để sửa lỗi nhảy CTA ra giữa trang */
  background: #f8f8f8;
}

.main-wrapper {
  position: relative; /* Để CTA neo vào đúng đáy của wrapper này */
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  /* padding dưới 150px để chừa chỗ trống cho CTA khi nằm ở cuối trang */
  padding: 30px 15px 150px 15px; 
}

.content-box {
  width: 100%;
  max-width: 1920px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hint-text {
  display: none;
  margin-bottom: 20px;
  font-family: sans-serif;
  font-size: 14px;
  color: #888;
  text-align: center;
}

@media (max-width: 1023px) and (orientation: portrait) {
  .hint-text.show-hint {
    display: block;
  }
}

img {
  width: 100%;
  height: auto;
  display: block;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  border-radius: 4px;
}

/* ================= CTA FLOATING ================= */

.cta-section {
  position: fixed;
  bottom: -150px; /* Bắt đầu từ ngoài màn hình để có hiệu ứng trượt lên */
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  padding: 16px;
  z-index: 999;
  
  /* Hiệu ứng xuất hiện mượt mà */
  opacity: 0;
  transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
  
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Class được add bằng JS khi load trang xong (sau 1.5s) */
.cta-section.show {
  bottom: 20px;
  opacity: 1;
}

/* Class được add bằng JS khi cuộn đến cuối trang */
.cta-section.docked {
  position: absolute; /* Chuyển từ fixed sang absolute để nằm im dưới đáy */
  bottom: 20px; 
}

/* Nút bấm chung */
.cta-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  font-family: sans-serif;
  font-size: 15px;
  text-align: center;
  transition: all 0.3s ease;
}

/* MAIN CTA (Nút Zalo) */
.cta-primary {
  background: #0068ff; /* Mã màu chuẩn của Zalo */
  color: #fff;
}

.cta-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0, 104, 255, 0.4); 
}

/* FORM CTA (Nút nhận báo giá) */
.cta-secondary-btn {
  background: #f2f4f7;
  color: #333;
}

.cta-secondary-btn:hover {
  transform: translateY(-3px);
  background: #e4e7ec;
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
}

/* MOBILE */
@media (max-width: 768px) {
  .cta-section {
    left: 0;
    transform: none; 
    width: 100%;
    max-width: none;
    border-radius: 16px 16px 0 0;
  }
  .cta-section.show {
    bottom: 0;
  }
  .cta-section.docked {
    bottom: 0;
  }
}

@media (min-width: 1024px) {
  img.is-portrait {
    max-width: 1000px;
  }
}
</style>
</head>

<body>

<div class="main-wrapper">
  <div class="content-box">
    <div id="hint" class="hint-text">Vui lòng xoay ngang máy để xem rõ hơn</div>
    <img id="brochureImage" src="" alt="VFG Brochure">
  </div>

  <div class="cta-section" id="ctaBox">
    <a href="https://zalo.me/0931950605" class="cta-btn cta-primary"
       onclick="gtag('event','click_zalo',{event_category:'engagement'});">
      Nhận tư vấn nhanh qua Zalo
    </a>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfDzJJCNEodqHBMdhroKRQHH6LZwNtemmyuIkXCyhe2JxTEnQ/viewform?usp=sharing&ouid=117381462687040849913"
       class="cta-btn cta-secondary-btn"
       onclick="gtag('event','click_form',{event_category:'engagement'});">
      Để lại thông tin nhận báo giá
    </a>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const imageList = [
    { src: "brochure.jpg", type: "landscape" },
    { src: "brochure-portrait.jpg", type: "portrait" }
  ];

  const randomItem = imageList[Math.floor(Math.random() * imageList.length)];
  
  const imgElement = document.getElementById("brochureImage");
  const hintElement = document.getElementById("hint");

  imgElement.src = randomItem.src;

  if (randomItem.type === "portrait") {
    imgElement.classList.add("is-portrait");
    hintElement.classList.remove("show-hint");
  } else {
    imgElement.classList.remove("is-portrait");
    hintElement.classList.add("show-hint");
  }

  // --- LOGIC HIỂN THỊ CTA ---
  const cta = document.getElementById("ctaBox");

  // Hàm kiểm tra xem đã cuộn đến đáy trang chưa
  function checkDock() {
    const scrollY = window.scrollY;
    const innerHeight = window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    
    // Nếu chiều cao trang nhỏ hơn màn hình, hoặc đã cuộn đến đáy (sai số 5px)
    if (scrollY + innerHeight >= docHeight - 5) {
      cta.classList.add('docked');
    } else {
      cta.classList.remove('docked');
    }
  }

  // 1. Hiệu ứng trượt lên sau 1.5 giây (1500ms)
  setTimeout(() => {
    cta.classList.add("show");
    checkDock(); // Kiểm tra ngay khi hiện ra xem có cần dock luôn không (với màn ngang)
  }, 1500);

  // 2. Scroll tracking & tự động tách khi chạm đáy
  window.addEventListener("scroll", function() {
    const scrollY = window.scrollY;
    const innerHeight = window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    
    // Tracking Analytics 50%
    const percent = Math.round((scrollY / (docHeight - innerHeight)) * 100);
    if (percent > 50 && !window.tracked50) {
      gtag('event', 'scroll_50', {event_category:'engagement'});
      window.tracked50 = true;
    }

    // Cập nhật vị trí CTA
    checkDock();
  });
  
  // Xử lý khi người dùng xoay màn hình (resize)
  window.addEventListener("resize", checkDock);

});
</script>

</body>
</html>
