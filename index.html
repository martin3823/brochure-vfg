<!DOCTYPE html>
<html lang="vi">
<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-4XTLZ17D21"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-4XTLZ17D21');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFG Brochure</title>

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0; padding: 0;
  width: 100%; 
  background: #f8f8f8;
}

.main-wrapper {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 15px 150px 15px; 
}

.content-box {
  width: 100%;
  max-width: 1920px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hint-text {
  display: none;
  margin-bottom: 20px;
  font-family: sans-serif;
  font-size: 14px;
  color: #888;
  text-align: center;
}

@media (max-width: 1023px) and (orientation: portrait) {
  .hint-text.show-hint {
    display: block;
  }
}

img {
  width: 100%;
  height: auto;
  display: block;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  border-radius: 4px;
}

/* ================= CTA FLOATING (Mặc định) ================= */

.cta-section {
  position: fixed;
  bottom: -150px; 
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 420px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  padding: 16px;
  z-index: 999;
  
  opacity: 0;
  transition: bottom 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease;
  
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.cta-section.show {
  bottom: 20px;
  opacity: 1;
}

.cta-section.docked {
  position: absolute; 
  bottom: 20px; 
}

.cta-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  font-family: sans-serif;
  font-size: 15px;
  text-align: center;
  transition: all 0.3s ease;
}

.cta-primary {
  background: #0068ff; 
  color: #fff;
}

.cta-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0, 104, 255, 0.4); 
}

.cta-secondary-btn {
  background: #f2f4f7;
  color: #333;
}

.cta-secondary-btn:hover {
  transform: translateY(-3px);
  background: #e4e7ec;
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
}

/* MOBILE DỌC */
@media (max-width: 768px) and (orientation: portrait) {
  .cta-section {
    left: 0;
    transform: none; 
    width: 100%;
    max-width: none;
    border-radius: 16px 16px 0 0;
  }
  .cta-section.show, .cta-section.docked {
    bottom: 0;
  }
}

/* ================= TÙY CHỈNH RIÊNG CHẾ ĐỘ XOAY NGANG ================= */
@media (max-width: 1024px) and (orientation: landscape) {
  .main-wrapper {
    padding-bottom: 30px; 
  }
  
  .cta-section, .cta-section.show, .cta-section.docked {
    position: relative !important;
    bottom: auto !important;
    left: auto !important;
    transform: none !important;
    opacity: 1 !important; 
    width: 100%;
    max-width: 500px;
    margin-top: 30px; 
    background: transparent !important;
    box-shadow: none !important;
    backdrop-filter: none !important;
    padding: 0 !important;
  }
}

@media (min-width: 1024px) {
  img.is-portrait {
    max-width: 1000px;
  }
}
</style>
</head>

<body>

<div class="main-wrapper">
  <div class="content-box">
    <div id="hint" class="hint-text">Vui lòng xoay ngang máy để xem rõ hơn</div>
    <img id="brochureImage" src="" alt="VFG Brochure">
  </div>

  <div class="cta-section" id="ctaBox">
    <a href="https://zalo.me/0931950605" class="cta-btn cta-primary"
       onclick="trackAndGo(event, 'click_zalo', this.href, 'zalo_button');">
      Nhận tư vấn nhanh qua Zalo
    </a>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeB0luzw_gwpXZSiH6ENEvVTdcB4y0Yn5mheVXQBit1IbLZew/viewform?usp=header"
       class="cta-btn cta-secondary-btn"
       onclick="trackAndGo(event, 'click_form', this.href, 'form_button');">
      Để lại thông tin nhận báo giá
    </a>
  </div>
</div>

<script>
// --- HÀM HỖ TRỢ TRACKING GA ---
function trackAndGo(e, eventName, url, label) {
  e.preventDefault(); // Chặn việc chuyển trang ngay lập tức
  
  // Gửi sự kiện cho Google Analytics
  gtag('event', eventName, {
    event_category: 'cta',
    event_label: label
  });
  
  // Đợi 200ms để GA gửi tín hiệu xong mới chuyển trang
  setTimeout(() => {
    window.location.href = url;
  }, 200);
}

document.addEventListener("DOMContentLoaded", function() {

  const imageList = [
    { src: "brochure.jpg", type: "landscape" },
    { src: "brochure-portrait.jpg", type: "portrait" }
  ];

  const randomItem = imageList[Math.floor(Math.random() * imageList.length)];
  
  const imgElement = document.getElementById("brochureImage");
  const hintElement = document.getElementById("hint");

  imgElement.src = randomItem.src;

  if (randomItem.type === "portrait") {
    imgElement.classList.add("is-portrait");
    hintElement.classList.remove("show-hint");
  } else {
    imgElement.classList.remove("is-portrait");
    hintElement.classList.add("show-hint");
  }

  const cta = document.getElementById("ctaBox");

  function checkDock() {
    const scrollY = window.scrollY;
    const innerHeight = window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    
    if (scrollY + innerHeight >= docHeight - 5) {
      cta.classList.add('docked');
    } else {
      cta.classList.remove('docked');
    }
  }

  setTimeout(() => {
    cta.classList.add("show");
    checkDock(); 
  }, 1500);

  window.addEventListener("scroll", function() {
    const scrollY = window.scrollY;
    const innerHeight = window.innerHeight;
    const docHeight = document.documentElement.scrollHeight;
    
    const percent = Math.round((scrollY / (docHeight - innerHeight)) * 100);
    if (percent > 50 && !window.tracked50) {
      window.tracked50 = true; // Set cờ ngay lập tức để không bị lặp
      
      // Delay sự kiện scroll 500ms để đảm bảo session_start được gửi trước
      setTimeout(() => {
        gtag('event', 'scroll_50', { event_category: 'engagement' });
      }, 500);
    }

    checkDock();
  });
  
  window.addEventListener("resize", checkDock);

});
</script>

</body>
</html>
