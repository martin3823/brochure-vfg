<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFG Brochure</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow-x: hidden;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
}

/* Ảnh */
img {
  width: 100%;
  display: block;
  cursor: pointer;
}

/* Fullscreen mode */
.fullscreen-mode {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* Ảnh khi fullscreen */
.fullscreen-mode img {
  width: auto;
  height: 100%;
  max-width: none;
}

/* Nút */
.btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* Gợi ý xoay */
.rotate-hint {
  text-align: center;
  color: #aaa;
  font-size: 12px;
  padding: 8px;
}
</style>
</head>

<body>

<div class="rotate-hint">Xoay ngang để xem rõ hơn</div>

<div class="container" id="viewer">
  <img id="img" src="brochure.jpg">
</div>

<button class="btn" onclick="enterFullscreen()">Fullscreen</button>

<script>
const viewer = document.getElementById("viewer");
const img = document.getElementById("img");

/* ===== FULLSCREEN ===== */
function enterFullscreen() {
  viewer.classList.add("fullscreen-mode");

  if (viewer.requestFullscreen) {
    viewer.requestFullscreen();
  }

  lockLandscape();
}

function exitFullscreen() {
  viewer.classList.remove("fullscreen-mode");

  if (document.exitFullscreen) {
    document.exitFullscreen();
  }

  unlockOrientation();
}

/* Click ảnh = fullscreen */
img.onclick = enterFullscreen;

/* Click ngoài thoát */
viewer.onclick = exitFullscreen;

/* ===== AUTO ROTATE HANDLING ===== */
function checkOrientation() {
  if (window.innerWidth > window.innerHeight) {
    // Landscape
    viewer.classList.add("fullscreen-mode");
  } else {
    viewer.classList.remove("fullscreen-mode");
  }
}

window.addEventListener("resize", checkOrientation);
checkOrientation();

/* ===== LOCK ORIENTATION (Android only) ===== */
function lockLandscape() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(() => {});
  }
}

function unlockOrientation() {
  if (screen.orientation && screen.orientation.unlock) {
    screen.orientation.unlock();
  }
}
</script>

</body>
</html>
