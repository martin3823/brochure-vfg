<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFG Brochure</title>
  
  <style>
    /* Reset lề mặc định của trình duyệt */
    * {
      box-sizing: border-box;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh; /* Đảm bảo tối thiểu bằng chiều cao màn hình */
      background: #f8f8f8;
    }

    /* Khung ngoài cùng bọc toàn bộ trang */
    .main-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 15px; /* Khoảng cách lề an toàn cho điện thoại */
    }

    /* Khung chứa nội dung - Dùng margin: auto để chống lỗi cắt phần trên */
    .content-box {
      margin: auto;
      width: 100%;
      max-width: 1920px; /* Điểm chốt an toàn để ảnh không to lố trên tivi/màn hình cong */
    }

    .hint-text {
      margin-bottom: 15px;
      font-family: sans-serif;
      font-size: 14px;
      color: #888;
      text-align: center;
    }

    /* Thiết lập cho ảnh brochure */
    img {
      width: 100%; /* Bung full kích thước của khung chứa */
      height: auto; /* Giữ nguyên tỷ lệ ảnh gốc */
      display: block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Đổ bóng cho giống ấn phẩm in */
    }

    /* Cấu hình riêng cho máy tính và khi xoay ngang điện thoại */
    @media (min-width: 1024px) or (orientation: landscape) {
      .hint-text {
        display: none; /* Ẩn dòng nhắc nhở đi */
      }
      .main-wrapper {
        padding: 40px; /* Tăng lề viền ngoài trên máy tính để thiết kế có không gian "thở" */
      }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="content-box">
      <div class="hint-text">🔄 Vui lòng xoay ngang máy để xem rõ hơn</div>
      
      <img src="brochure.jpg" alt="VFG Brochure">
    </div>
  </div>

</body>
</html>
