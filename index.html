<!DOCTYPE html>
<html lang="vi">
<head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-4XTLZ17D21"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-4XTLZ17D21');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFG Brochure</title>

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #f8f8f8;
}

.main-wrapper {
  width: 100%;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 15px;
}

.content-box {
  width: 100%;
  max-width: 1920px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hint-text {
  display: none;
  margin-bottom: 20px;
  font-family: sans-serif;
  font-size: 14px;
  color: #888;
  text-align: center;
}

@media (max-width: 1023px) and (orientation: portrait) {
  .hint-text.show-hint {
    display: block;
  }
}

img {
  width: 100%;
  height: auto;
  display: block;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  border-radius: 4px;
}

/* --- CTA SECTION --- */
.cta-section {
  margin-top: 40px;
  margin-bottom: 40px;
  text-align: center;
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  font-family: sans-serif;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 24px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 15px rgba(0,0,0,0.15);
}

.btn-primary {
  background: #0068ff;
  color: #fff;
}

.btn-secondary {
  background: #fff;
  color: #f26d3d;
  border: 2px solid #f26d3d;
}

.cta-tertiary {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 10px;
}

.cta-tertiary a {
  color: #555;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  transition: color 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.cta-tertiary a:hover {
  color: #0068ff;
  text-decoration: underline;
}

@media (max-width: 480px) {
  .btn {
    font-size: 15px;
    padding: 14px 20px;
  }
  .cta-tertiary {
    gap: 20px;
  }
}

@media (min-width: 1024px) {
  img.is-portrait {
    max-width: 1000px;
  }
}

</style>
</head>

<body>

<div class="main-wrapper">
  <div class="content-box">

    <div id="hint" class="hint-text">🔄 Vui lòng xoay ngang máy để xem rõ hơn</div>

    <img id="brochureImage" src="" alt="VFG Brochure">

    <div class="cta-section">
      <a href="https://zalo.me/0931950605" class="btn btn-primary"
         onclick="gtag('event','click_zalo',{event_category:'engagement'});">
        👉 Nhận tư vấn nhanh qua Zalo
      </a>

      <a href="https://docs.google.com/forms/d/e/1FAIpQLSfDzJJCNEodqHBMdhroKRQHH6LZwNtemmyuIkXCyhe2JxTEnQ/viewform?usp=sharing&ouid=117381462687040849913" 
         class="btn btn-secondary"
         onclick="gtag('event','click_form',{event_category:'engagement'});">
        📩 Để lại thông tin nhận báo giá
      </a>

      <div class="cta-tertiary">
        <a href="https://facebook.com/yourpage"
           onclick="gtag('event','click_facebook',{event_category:'engagement'});">
          🔗 Xem Fanpage
        </a>
        <a href="mailto:studio@sdc.vn"
           onclick="gtag('event','click_email',{event_category:'engagement'});">
          📧 Gửi email
        </a>
      </div>
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const imageList = [
    { src: "brochure.jpg", type: "landscape" },
    { src: "brochure-portrait.jpg", type: "portrait" }
  ];

  const randomItem = imageList[Math.floor(Math.random() * imageList.length)];
  
  const imgElement = document.getElementById("brochureImage");
  const hintElement = document.getElementById("hint");

  imgElement.src = randomItem.src;

  if (randomItem.type === "portrait") {
    imgElement.classList.add("is-portrait");
    hintElement.classList.remove("show-hint");
  } else {
    imgElement.classList.remove("is-portrait");
    hintElement.classList.add("show-hint");
  }

  // Scroll tracking
  window.addEventListener("scroll", function() {
    const scrollY = window.scrollY;
    const height = document.body.scrollHeight - window.innerHeight;
    const percent = Math.round((scrollY / height) * 100);

    if (percent > 50 && !window.tracked50) {
      gtag('event', 'scroll_50', {event_category:'engagement'});
      window.tracked50 = true;
    }
  });

});
</script>

</body>
</html>
